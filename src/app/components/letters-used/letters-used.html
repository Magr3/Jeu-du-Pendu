<div class="text-center">
    @if (letters().length == 0) {
    <p class="hint-text">Tapez une lettre au clavier</p>
    }
            
    <div id="letters-used" class="letters-container">
    @for (letter of letters(); track $index ) {
        @if (letter.isCorrect) {
        <span class="badge badge-success">{{letter.letter}}</span>
        } @else {
        <span class="badge badge-error">{{letter.letter}}</span>
        }
    }
    </div>
</div>
